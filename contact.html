<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>お問い合わせ - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Portfolio</h1>
    <nav>
        <ul>
            <li><a href="index.html#home">HOME</a></li>
            <li><a href="work.html">WORK</a></li>
            <li><a href="index.html#about">ABOUT</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>
</header>

<section id="contact-page">
    <h2>CONTACT</h2>
    <p class="contact-intro">
        ご質問やご依頼がございましたら、下記のフォームよりお気軽にお問い合わせください。
    </p>

    <form class="contact-form" action="#" method="POST">
        <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                required
                placeholder="山田太郎"
            >
        </div>

        <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required
                placeholder="example@email.com"
            >
        </div>

        <div class="form-group">
            <label for="phone">電話番号</label>
            <input 
                type="tel" 
                id="phone" 
                name="phone" 
                placeholder="090-0000-0000"
            >
        </div>

        <div class="form-group">
            <label for="subject">件名 <span class="required">*</span></label>
            <input 
                type="text" 
                id="subject" 
                name="subject" 
                required
                placeholder="お問い合わせ内容"
            >
        </div>

        <div class="form-group">
            <label for="message">メッセージ <span class="required">*</span></label>
            <textarea 
                id="message" 
                name="message" 
                required
                rows="6"
                placeholder="詳細な内容をお書きください"
            ></textarea>
        </div>

        <button type="submit" class="submit-btn">送信</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 Portfolio. All rights reserved.</p>
</footer>

</body>
</html>
